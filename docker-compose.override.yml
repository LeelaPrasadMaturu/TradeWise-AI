# Docker Compose Override for Local Development
# This file is automatically merged with docker-compose.yml

version: '3.8'

services:
  # Development overrides for API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"
      - "9229:9229"  # Node.js debugger port

  # Development overrides for Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # Development overrides for Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps  # Use deps stage for dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: ["npm", "run", "dev"]
    ports:
      - "3001:3000"

  # Expose MongoDB port for local access
  mongo:
    ports:
      - "27017:27017"

  # Expose Redis port for local access
  redis:
    ports:
      - "6379:6379"

  # Expose Kafka ports for local access
  kafka:
    ports:
      - "9092:9092"
      - "29092:29092"
