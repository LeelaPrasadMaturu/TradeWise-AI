# Template for Kubernetes secrets
# In production, use sealed-secrets, external-secrets, or vault
# DO NOT commit actual secrets to git

apiVersion: v1
kind: Secret
metadata:
  name: tradewise-secrets
  namespace: tradewise
  labels:
    app.kubernetes.io/name: tradewise
type: Opaque
stringData:
  # JWT
  JWT_SECRET: "REPLACE_WITH_SECURE_SECRET"
  
  # AI Services
  GOOGLE_AI_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  HUGGINGFACE_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  COHERE_API_KEY: "REPLACE_WITH_ACTUAL_KEY"
  
  # SMTP (optional)
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "TradeWise AI <coach@tradewise.ai>"
  
  # Redis (if auth enabled)
  REDIS_PASSWORD: ""
  
  # MongoDB (if auth enabled)
  MONGO_USERNAME: ""
  MONGO_PASSWORD: ""
