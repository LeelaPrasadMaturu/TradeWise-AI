apiVersion: v1
kind: ConfigMap
metadata:
  name: tradewise-config
  namespace: tradewise
  labels:
    app.kubernetes.io/name: tradewise
data:
  # Server configuration
  NODE_ENV: "production"
  PORT: "3000"
  
  # Database
  MONGODB_URI: "mongodb://mongo-0.mongo-headless.tradewise.svc.cluster.local:27017,mongo-1.mongo-headless.tradewise.svc.cluster.local:27017,mongo-2.mongo-headless.tradewise.svc.cluster.local:27017/tradewise?replicaSet=rs0"
  
  # Redis
  REDIS_HOST: "redis-master.tradewise.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_QUEUE_DB: "1"
  
  # Kafka
  KAFKA_BROKERS: "kafka-0.kafka-headless.tradewise.svc.cluster.local:9092,kafka-1.kafka-headless.tradewise.svc.cluster.local:9092,kafka-2.kafka-headless.tradewise.svc.cluster.local:9092"
  KAFKA_CLIENT_ID: "tradewise-api"
  
  # Observability
  JAEGER_ENDPOINT: "http://jaeger-collector.tradewise.svc.cluster.local:14268/api/traces"
  PROMETHEUS_ENABLED: "true"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
