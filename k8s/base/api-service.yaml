apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tradewise
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tradewise-api
  namespace: tradewise
  labels:
    app.kubernetes.io/name: api
