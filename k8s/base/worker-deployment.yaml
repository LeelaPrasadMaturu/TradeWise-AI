apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: tradewise
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: background
    app.kubernetes.io/part-of: tradewise-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: worker
        app.kubernetes.io/name: worker
    spec:
      serviceAccountName: tradewise-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
        - name: worker
          image: ghcr.io/tradewise/api:latest
          imagePullPolicy: Always
          command: ["node", "workers/index.js"]
          
          envFrom:
            - configMapRef:
                name: tradewise-config
            - secretRef:
                name: tradewise-secrets
          
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "node -e 'process.exit(0)'"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: tmp
          emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: worker
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tradewise-worker
  namespace: tradewise
  labels:
    app.kubernetes.io/name: worker
