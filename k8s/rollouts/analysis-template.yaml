apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: tradewise
spec:
  args:
    - name: service-name
      value: api
  metrics:
    - name: success-rate
      # Run every minute for 5 minutes
      interval: 1m
      count: 5
      # Success threshold: must pass all checks
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.tradewise.svc.cluster.local:9090
          query: |
            sum(rate(
              tradewise_http_requests_total{
                service="{{args.service-name}}",
                status!~"5.."
              }[5m]
            )) /
            sum(rate(
              tradewise_http_requests_total{
                service="{{args.service-name}}"
              }[5m]
            ))

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: latency-check
  namespace: tradewise
spec:
  args:
    - name: service-name
      value: api
  metrics:
    - name: latency-p99
      interval: 1m
      count: 5
      # P99 latency must be under 500ms
      successCondition: result[0] <= 0.5
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus.tradewise.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(
                tradewise_http_request_duration_seconds_bucket{
                  service="{{args.service-name}}"
                }[5m]
              )) by (le)
            )

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: error-rate
  namespace: tradewise
spec:
  args:
    - name: service-name
      value: api
  metrics:
    - name: error-rate
      interval: 1m
      count: 5
      # Error rate must be under 5%
      successCondition: result[0] <= 0.05
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.tradewise.svc.cluster.local:9090
          query: |
            sum(rate(
              tradewise_http_requests_total{
                service="{{args.service-name}}",
                status=~"5.."
              }[5m]
            )) /
            sum(rate(
              tradewise_http_requests_total{
                service="{{args.service-name}}"
              }[5m]
            ))
