apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: tradewise
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  replicas: 5
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: api
  
  strategy:
    canary:
      # Canary steps
      steps:
        # Step 1: 10% traffic to canary
        - setWeight: 10
        - pause: {duration: 2m}
        
        # Step 2: Automated analysis at 10%
        - analysis:
            templates:
              - templateName: success-rate
              - templateName: latency-check
        
        # Step 3: 25% traffic
        - setWeight: 25
        - pause: {duration: 3m}
        
        # Step 4: 50% traffic
        - setWeight: 50
        - pause: {duration: 5m}
        
        # Step 5: Analysis at 50%
        - analysis:
            templates:
              - templateName: success-rate
        
        # Step 6: 75% traffic
        - setWeight: 75
        - pause: {duration: 5m}
        
        # Step 7: Full rollout
        - setWeight: 100
      
      # Traffic routing
      canaryService: api-canary
      stableService: api-stable
      
      # Traffic management with Istio/Nginx
      trafficRouting:
        nginx:
          stableIngress: api-stable-ingress
          annotationPrefix: nginx.ingress.kubernetes.io
      
      # Anti-affinity for canary pods
      antiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          weight: 100
      
      # Canary metadata
      canaryMetadata:
        labels:
          role: canary
        annotations:
          version: canary
      
      # Stable metadata
      stableMetadata:
        labels:
          role: stable
        annotations:
          version: stable
  
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: tradewise-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
        - name: api
          image: ghcr.io/tradewise/api:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 3000
          
          envFrom:
            - configMapRef:
                name: tradewise-config
            - secretRef:
                name: tradewise-secrets
          
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      
      volumes:
        - name: tmp
          emptyDir: {}
