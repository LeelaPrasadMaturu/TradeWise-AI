apiVersion: v2
name: tradewise
description: TradeWise AI - Intelligent Trading Assistant Helm Chart
type: application
version: 1.0.0
appVersion: "1.2.1"

keywords:
  - trading
  - ai
  - analytics
  - behavioral

home: https://github.com/tradewise/tradewise-ai

maintainers:
  - name: TradeWise Team
    email: team@tradewise.ai

dependencies:
  - name: mongodb
    version: 14.4.0
    repository: https://charts.bitnami.com/bitnami
    condition: mongodb.enabled
  
  - name: redis
    version: 18.6.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  
  - name: kafka
    version: 26.6.0
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
