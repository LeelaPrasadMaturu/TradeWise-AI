# TradeWise AI - Production Environment Values

api:
  replicaCount: 5
  
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  
  podDisruptionBudget:
    minAvailable: 3

worker:
  replicaCount: 4
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 20

frontend:
  replicaCount: 3
  
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "500"
    nginx.ingress.kubernetes.io/limit-connections: "100"
  hosts:
    - host: api.tradewise.ai
      paths:
        - path: /
          pathType: Prefix
          service: api
    - host: app.tradewise.ai
      paths:
        - path: /
          pathType: Prefix
          service: frontend

config:
  logLevel: warn

mongodb:
  replicaCount: 3
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

redis:
  replica:
    replicaCount: 3
  persistence:
    size: 16Gi

kafka:
  replicaCount: 3
  zookeeper:
    replicaCount: 3
  persistence:
    size: 100Gi
