name: Load Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of load test to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
          - hpa-validation
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  schedule:
    # Run smoke tests daily at 6 AM UTC
    - cron: '0 6 * * *'

env:
  K6_VERSION: '0.47.0'

jobs:
  load-test:
    name: Run Load Test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz | tar xzf -
          sudo mv k6-v${K6_VERSION}-linux-amd64/k6 /usr/local/bin/
          k6 version
      
      - name: Determine test file
        id: test-file
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'smoke' }}"
          echo "test_file=loadtests/${TEST_TYPE}.k6.js" >> $GITHUB_OUTPUT
          echo "test_type=${TEST_TYPE}" >> $GITHUB_OUTPUT
      
      - name: Determine base URL
        id: base-url
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [ "$ENV" = "production" ]; then
            echo "base_url=https://api.tradewise.ai" >> $GITHUB_OUTPUT
          else
            echo "base_url=https://api.staging.tradewise.ai" >> $GITHUB_OUTPUT
          fi
      
      - name: Run load test
        run: |
          k6 run \
            --out json=results.json \
            -e BASE_URL=${{ steps.base-url.outputs.base_url }} \
            -e AUTH_TOKEN=${{ secrets.LOAD_TEST_TOKEN }} \
            ${{ steps.test-file.outputs.test_file }}
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: k6-results-${{ steps.test-file.outputs.test_type }}
          path: |
            results.json
            *-test-results.json
      
      - name: Check thresholds
        run: |
          # Parse results and check if thresholds passed
          if grep -q '"thresholds":{".*":{"ok":false' results.json; then
            echo "Load test thresholds failed!"
            exit 1
          fi
          echo "All load test thresholds passed!"
      
      - name: Post results to Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
          text: 'Load test (${{ steps.test-file.outputs.test_type }}) completed on ${{ github.event.inputs.environment || 'staging' }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
